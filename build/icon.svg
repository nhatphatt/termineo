<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Terminal prompt > -->
  <text x="100" y="320" font-family="Consolas, monospace" font-size="280" font-weight="bold" fill="url(#accent)">T</text>
  <!-- Cursor blink line -->
  <rect x="330" y="120" width="8" height="200" rx="4" fill="#58a6ff" opacity="0.8"/>
  <!-- Underline accent -->
  <rect x="80" y="370" width="352" height="6" rx="3" fill="url(#accent)" opacity="0.5"/>
</svg>
